repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: test-skill
        name: Run Skill Structural Tests
        entry: python3 skill/scripts/test_skill.py
        language: system
        pass_filenames: false
        always_run: true
      
      - id: pytest-skill
        name: Run Skill Unit Tests
        entry: python3 -m pytest skill/tests/ -q
        language: system
        pass_filenames: false
        always_run: true
